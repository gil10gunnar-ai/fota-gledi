<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fóta Gleði</title>
  <style>
    :root {
      --pink: #d63384;
      --bg: #ffd9e5;
      --card: white;
      --shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #ffe4eb, #ffd1e0);
      color: #222;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px;
    }

    header {
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 16px;
      background: #f4f4f4;
    }

    h1 {
      font-size: 2.8rem;
      color: var(--pink);
      line-height: 1;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 1.05rem;
    }

    .cart-btn {
      font-size: 2.3rem;
      cursor: pointer;
      position: relative;
      user-select: none;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -10px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--pink);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 800;
    }

    nav {
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 22px;
    }

    nav button {
      border: 2px solid #ffb6c1;
      background: white;
      color: var(--pink);
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
    }

    nav button.active,
    nav button:hover {
      background: var(--pink);
      color: white;
    }

    .section { display: none; }
    .section.active { display: block; }

    .hero, .panel {
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 22px;
    }

    .hero h2,
    .panel h2 {
      color: var(--pink);
      margin-bottom: 12px;
      font-size: 2rem;
    }

    .hero p,
    .panel p {
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .product-card {
      background: white;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .product-image {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
      background: #f5f5f5;
    }

    .product-info {
      padding: 18px;
      text-align: center;
    }

    .product-name {
      font-size: 1.25rem;
      margin-bottom: 8px;
    }

    .product-desc {
      color: #666;
      margin-bottom: 10px;
    }

    .product-price {
      color: var(--pink);
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .btn-add {
      width: 100%;
      border: none;
      background: var(--pink);
      color: white;
      padding: 13px;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
    }

    .cart-items {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .cart-item {
      display: flex;
      gap: 14px;
      align-items: center;
      background: #fff7fa;
      border-radius: 18px;
      padding: 14px;
    }

    .cart-item img {
      width: 84px;
      height: 84px;
      object-fit: cover;
      border-radius: 14px;
    }

    .cart-item-info {
      flex: 1;
      text-align: left;
    }

    .remove-btn {
      border: none;
      background: #ff5c8a;
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .total {
      margin-top: 18px;
      color: var(--pink);
      font-size: 1.3rem;
      font-weight: 900;
    }

    .location-img {
      width: 100%;
      max-width: 850px;
      border-radius: 18px;
      margin-top: 18px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 700px) {
      h1 { font-size: 2rem; }
      .logo { width: 74px; height: 74px; }
      .product-image { height: 250px; }
      .cart-item { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <img src="images/Screenshot 2026-05-20 11.54.56.png" alt="Logo" class="logo">
        <div>
          <h1>Fóta Gleði</h1>
          <p class="subtitle">Sokkar og Inniskór fyrir alla!</p>
        </div>
      </div>
      <div class="cart-btn" onclick="showSection('cart')">🛒 <span class="cart-count" id="cart-count">0</span></div>
    </header>

    <nav>
      <button class="active" onclick="showSection('products')">Vörur</button>
      <button onclick="showSection('about')">Um Okkur</button>
      <button onclick="showSection('cart')">Karfan</button>
      <button onclick="showSection('location')">Staðsetning</button>
    </nav>

    <div id="products" class="section active">
      <div class="hero">
        <h2>Velkomin í Fóta Gleði</h2>
        <p>Skemmtilegir sokkar, mjúkir inniskór og vörur sem gera daginn betri.</p>
      </div>
      <div class="products-grid" id="product-grid"></div>
    </div>

    <div id="about" class="section">
      <div class="panel">
        <h2>Um Okkur</h2>
        <p>Við erum nokkrir nemendur úr 10 bekk Giljaskóla og við ákváðum að byrja sokka fyrirtæki.</p>
      </div>
    </div>

    <div id="cart" class="section">
      <div class="panel">
        <h2>Karfan þín</h2>
        <div id="cart-items" class="cart-items"></div>
        <div id="cart-total" class="total">Samtals: 0 kr.</div>
      </div>
    </div>

    <div id="location" class="section">
      <div class="panel">
        <h2>📍 Staðsetning</h2>
        <img src="images/Screenshot 2026-05-21 9.02.07 AM.png" alt="Staðsetning" class="location-img">
      </div>
    </div>
  </div>

  <script>
    const products = [
      { id: 1, name: "Funny Scream Socks", price: 2290, img: "images/Funny-Socks-Scream-Art.webp", desc: "Fyndnir sokkar" },
      { id: 2, name: "Music Lovers Socks", price: 2190, img: "images/Music-Lovers-Socks-David-Toewie_480x_2x_f64a7d83-a41a-4057-b9cf-3e82cec7df98_1024x1024.webp", desc: "Tónlistarsokkar" },
      { id: 3, name: "Cozy Black Slippers", price: 3490, img: "images/Hush_Pajamas_1320_471c6d21-2391-4dad-896c-7adbe3e8a387.webp", desc: "Mjúkir svartir inniskór" },
      { id: 4, name: "Fótakrem í Túbu", price: 4000, img: "images/Screenshot 2026-05-21 8.50.51 AM.png", desc: "Fótakrem" },
      { id: 5, name: "Fótakrem í Dós", price: 6000, img: "images/Screenshot 2026-05-21 8.51.00 AM.png", desc: "Stór pakki" }
    ];

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function saveCart() {
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    function renderProducts() {
      const grid = document.getElementById("product-grid");
      grid.innerHTML = "";
      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <img src="${p.img}" alt="${p.name}" class="product-image">
          <div class="product-info">
            <h3 class="product-name">${p.name}</h3>
            <p class="product-desc">${p.desc}</p>
            <p class="product-price">${p.price.toLocaleString('is-IS')} kr.</p>
            <button class="btn-add" onclick="addToCart(${p.id})">Bæta í körfu</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      cart.push(product);
      saveCart();
      updateCartCount();
      renderCart();
      showSection('cart');
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      saveCart();
      updateCartCount();
      renderCart();
    }

    function updateCartCount() {
      document.getElementById("cart-count").textContent = cart.length;
    }

    function renderCart() {
      const cartItems = document.getElementById("cart-items");
      const cartTotal = document.getElementById("cart-total");

      if (cart.length === 0) {
        cartItems.innerHTML = "<p>Karfan er tóm.</p>";
        cartTotal.textContent = "Samtals: 0 kr.";
        return;
      }

      let total = 0;
      cartItems.innerHTML = cart.map((item, index) => {
        total += item.price;
        return `
          <div class="cart-item">
            <img src="${item.img}" alt="${item.name}">
            <div class="cart-item-info">
              <h3>${item.name}</h3>
              <p>${item.desc}</p>
              <p><strong>${item.price.toLocaleString('is-IS')} kr.</strong></p>
            </div>
            <button class="remove-btn" onclick="removeFromCart(${index})">Eyða</button>
          </div>
        `;
      }).join("");

      cartTotal.textContent = `Samtals: ${total.toLocaleString('is-IS')} kr.`;
    }

    function showSection(id) {
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    }

    window.onload = function() {
      renderProducts();
      updateCartCount();
      renderCart();
    };
  </script>
</body>
</html>
