<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fóta Gleði - Sokkar & Inniskór</title>
  <style>
    :root { --pink: #D63384; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #ffe4e9, #ffd1e0);
      color: #333;
    }
    .container { max-width: 1450px; margin: 0 auto; padding: 0 20px; }

    header {
      background: white;
      border-radius: 24px;
      padding: 25px 35px;
      margin: 25px 0 40px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .logo { height: 110px; border-radius: 16px; }

    .cart-icon { font-size: 2.8rem; cursor: pointer; position: relative; }
    .cart-count {
      position: absolute; top: -10px; right: -10px;
      background: var(--pink); color: white;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
    }

    nav {
      background: white;
      padding: 18px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 45px;
    }
    nav button {
      padding: 14px 28px;
      border: 2px solid #FFB6C1;
      background: white;
      color: var(--pink);
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s;
    }
    nav button.active, nav button:hover {
      background: var(--pink);
      color: white;
      transform: translateY(-4px);
    }

    /* Allar sections eru sýnilegar alltaf */
    .section { display: block; } 
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div style="display:flex; align-items:center; gap:20px;">
        <img src="images/Screenshot 2026-05-20 11.54.56.png" alt="Logo" class="logo" />
        <div>
          <h1 style="font-size: 3.2rem; color: var(--pink);">Fóta Gleði</h1>
          <p style="font-size: 1.35rem;">Sokkar og Inniskór fyrir alla!</p>
        </div>
      </div>
      <div class="cart-icon" onclick="showSection('cart')">🛒 <span class="cart-count" id="cart-count">0</span></div>
    </header>

    <nav>
      <!-- Takkar virka ekki lengur til að fela hluti -->
      <button class="active" onclick="showSection('products')">Vörur</button>
      <button onclick="showSection('about')">Um Okkur</button>
      <button onclick="showSection('cart')">Karfan</button>
      <button onclick="showSection('contact')">Hafa Samband</button>
      <button onclick="showSection('location')">Staðsetning</button>
    </nav>

    <div id="products" class="section">
      <div class="products-grid" id="product-grid"></div>
    </div>

    <div id="about" class="section" style="text-align:center; padding:60px;">
      <h2 style="color:var(--pink);">Um Okkur</h2>
      <p style="margin-top:20px;">Við erum í 10. bekk...</p>
    </div>

    <div id="cart" class="section" style="text-align:center; padding:100px;">
      <h2>Karfan þín er tóm...</h2>
    </div>

    <div id="location" class="section" style="text-align:center; padding:40px;">
      <h2 style="color:var(--pink);">📍 Staðsetning</h2>
      <img src="images/Screenshot 2026-05-21 9.02.07 AM.png" style="max-width:800px; border-radius:20px; margin-top:20px;">
    </div>

  </div>

  <script>
    const products = [
      { name: "Funny Scream Socks", price: 2290, img: "images/Funny-Socks-Scream-Art.webp", desc: "Fyndnir sokkar" },
      { name: "Music Lovers Socks", price: 2190, img: "images/Music-Lovers-Socks-David-Toewie_480x_2x_f64a7d83-a41a-4057-b9cf-3e82cec7df98_1024x1024.webp", desc: "Tónlistarsokkar" },
      { name: "Cozy Black Slippers", price: 3490, img: "images/Hush_Pajamas_1320_471c6d21-2391-4dad-896c-7adbe3e8a387.webp", desc: "Mjúkir svartir inniskór" },
      { name: "Fótakrem í Túbu", price: 4000, img: "images/Screenshot 2026-05-21 8.50.51 AM.png", desc: "Fótakrem" },
      { name: "Fótakrem í Dós", price: 6000, img: "images/Screenshot 2026-05-21 8.51.00 AM.png", desc: "Stór pakki" }
    ];

    function renderProducts() {
      const grid = document.getElementById("product-grid");
      grid.innerHTML = "";

      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <img src="${p.img}" class="product-image" alt="${p.name}">
          <div class="product-info">
            <h3 class="product-name">${p.name}</h3>
            <p>${p.desc}</p>
            <p class="product-price">${p.price.toLocaleString('is-IS')} kr.</p>
            <button class="btn-add" onclick="addToCart('${p.name}')">Bæta í körfu</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    let cartCount = 0;

    function addToCart(name) {
      cartCount++;
      document.getElementById("cart-count").textContent = cartCount;
      alert(`✅ ${name} hefur verið bætt í körfu! 🛒`);
    }

    // Fall til að sýna „Karfann“ en aðrir hlutar eru alltaf sýnilegir
    function showSection(id) {
      // Ekki gera neitt þar sem allir hlutar eru alltaf sýnilegar
    }

    window.onload = renderProducts;
  </script>
</body>
</html>
