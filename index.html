<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fóta Gleði</title>
  <style>
    :root {
      --accent: #D63384;
      --bg-light: linear-gradient(135deg, #FFB6C1 0%, #FFE4E1 100%);
      --card-light: #ffffff;
      --text-light: #333;
    }
    [data-theme="dark"] {
      --accent: #ff8ab8;
      --bg-light: linear-gradient(135deg, #1f0d18 0%, #2d1b2b 100%);
      --card-light: #2a1f2a;
      --text-light: #f0e0e8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-light);
      color: var(--text-light);
      min-height: 100vh;
      transition: all 0.5s ease;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

    header {
      background: var(--card-light);
      backdrop-filter: blur(12px);
      padding: 22px 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      margin: 25px 0 35px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .logo { width: 100px; height: 100px; object-fit: contain; border-radius: 18px; }

    .controls { display: flex; gap: 12px; align-items: center; }
    button {
      padding: 10px 16px;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    button:hover { transform: translateY(-3px); }

    nav {
      background: var(--card-light);
      padding: 18px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    nav button.active, nav button:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .content { display: none; animation: fadeIn 0.6s ease forwards; }
    .content.active { display: block; }
    @keyframes fadeIn { from {opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);} }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 30px;
    }
    .product-card {
      background: var(--card-light);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .product-card:hover {
      transform: translateY(-15px);
      box-shadow: 0 25px 50px rgba(214, 51, 132, 0.25);
    }
    .product-image {
      width: 100%;
      height: 290px;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .product-card:hover .product-image { transform: scale(1.1); }

    .product-info { padding: 24px; }
    .product-name { font-size: 1.4em; margin-bottom: 10px; }
    .product-price { font-size: 1.65em; color: var(--accent); font-weight: 700; margin: 12px 0; }

    .btn-add-cart {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-add-cart:hover { background: #b82e6f; transform: scale(1.03); }

    .modal {
      display: none; position: fixed; z-index: 1000;
      left: 0; top: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--card-light);
      border-radius: 24px;
      padding: 35px;
      max-width: 650px;
      width: 90%;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div style="display:flex; align-items:center; gap:20px;">
        <img src="Screenshot 2026-05-20 11.54.56.png" alt="Logo" class="logo">
        <div>
          <h1 id="siteTitle" style="font-size:2.6em; color:var(--accent);">Fóta Gleði</h1>
          <p id="tagline">Sokkar og Inniskór fyrir alla!</p>
        </div>
      </div>
      
      <div class="controls">
        <button onclick="toggleLanguage()">🇮🇸 / 🇬🇧</button>
        <button onclick="toggleTheme()" id="themeBtn">🌙</button>
      </div>
    </header>

    <nav>
      <button class="active" onclick="showSection('products')" id="nav1">Vörur</button>
      <button onclick="showSection('about')" id="nav2">Um Okkur</button>
      <button onclick="showSection('cart')" id="nav3">Karfan</button>
      <button onclick="showSection('contact')" id="nav4">Hafa Samband</button>
      <button onclick="showSection('location')" id="nav5">Staðsetning</button>
    </nav>

    <div id="products" class="content active">
      <div class="products-grid" id="productsGrid"></div>
    </div>

    <div id="about" class="content">
      <div style="background:var(--card-light); padding:40px; border-radius:24px; box-shadow:0 10px 35px rgba(0,0,0,0.1);">
        <h2 id="aboutTitle" style="color:var(--accent);">Um Okkur</h2>
        <p id="aboutText" style="margin-top:20px; font-size:1.1em; line-height:1.8;"></p>
      </div>
    </div>

    <div id="cart" class="content"><h2 style="text-align:center;margin-top:80px;">Karfan þín er tóm 🛒</h2></div>
    <div id="contact" class="content"><h2 style="text-align:center;margin-top:80px;">Hafa Samband</h2></div>
    <div id="location" class="content"><h2 style="text-align:center;margin-top:80px;">Staðsetning</h2></div>
  </div>

  <script>
    let currentLang = "is";

    const translations = {
      is: {
        title: "Fóta Gleði",
        tagline: "Sokkar og Inniskór fyrir alla!",
        products: "Vörur",
        about: "Um Okkur",
        cart: "Karfan",
        contact: "Hafa Samband",
        location: "Staðsetning",
        aboutText: "Við erum í 10. bekk og ákváðum að byrja okkar eigið sokka fyrirtæki. Alexandra, Angela, Ída, María og Gunnar."
      },
      en: {
        title: "Fóta Gleði",
        tagline: "Socks & Slippers for Everyone!",
        products: "Products",
        about: "About Us",
        cart: "Cart",
        contact: "Contact",
        location: "Location",
        aboutText: "We are 10th graders who decided to start our own sock company. Alexandra, Angela, Ída, María and Gunnar."
      }
    };

    const products = [
      {id:1, name_is:"Funny Scream Socks", name_en:"Funny Scream Socks", price:2290, img:"images/Funny-Socks-Scream-Art.webp", desc_is:"Sokkar sem láta þig skrika af gleði!", desc_en:"Socks that make you scream with joy!"},
      {id:2, name_is:"Music Lovers Socks", name_en:"Music Lovers Socks", price:1990, img:"images/Music-Lovers-Socks-David-Toewie_480x_2x_f64a7d83-a41a-4057-b9cf-3e82cec7df98_1024x1024.webp", desc_is:"Fyrir tónlistarunnendur", desc_en:"Perfect for music lovers"},
      {id:3, name_is:"Grey Alba Mule Slippers", name_en:"Grey Alba Mule Slippers", price:3490, img:"images/grey-alba-mule-slippers-lotus-p144.webp", desc_is:"Þægilegir gráir inniskór", desc_en:"Super comfortable grey slippers"}
    ];

    function toggleLanguage() {
      currentLang = currentLang === "is" ? "en" : "is";
      updateTexts();
      renderProducts();
    }

    function updateTexts() {
      const t = translations[currentLang];
      document.getElementById("siteTitle").textContent = t.title;
      document.getElementById("tagline").textContent = t.tagline;
      document.getElementById("nav1").textContent = t.products;
      document.getElementById("nav2").textContent = t.about;
      document.getElementById("nav3").textContent = t.cart;
      document.getElementById("nav4").textContent = t.contact;
      document.getElementById("nav5").textContent = t.location;
      document.getElementById("aboutText").textContent = t.aboutText;
    }

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      document.documentElement.setAttribute("data-theme", isDark ? "" : "dark");
      document.getElementById("themeBtn").textContent = isDark ? "🌙" : "☀️";
    }

    function renderProducts() {
      const grid = document.getElementById("productsGrid");
      grid.innerHTML = "";
      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <img src="${p.img}" class="product-image" alt="${p.name_is}">
          <div class="product-info">
            <h3 class="product-name">${currentLang === "is" ? p.name_is : p.name_en}</h3>
            <p>${currentLang === "is" ? p.desc_is : p.desc_en}</p>
            <p class="product-price">${p.price.toLocaleString("is-IS")} kr.</p>
            <button class="btn-add-cart" onclick="addToCart(${p.id})">
              ${currentLang === "is" ? "Bæta í körfu" : "Add to Cart"}
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function addToCart(id) {
      alert(currentLang === "is" ? "✅ Vara bætt í körfu!" : "✅ Added to cart!");
    }

    function showSection(id) {
      document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    // Initialize
    window.onload = () => {
      renderProducts();
      updateTexts();
    };
  </script>
</body>
</html>
